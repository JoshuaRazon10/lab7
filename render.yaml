services:
  # Backend Service
  - type: web
    name: mood-tracker-api
    env: node
    plan: free
    buildCommand: npm run install:backend
    startCommand: npm run start:backend
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: mood-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: mood-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mood-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: mood-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: mood-db
          property: port

  # Frontend Service
  - type: web
    name: mood-tracker-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://mood-tracker-api.onrender.com # Update this manually after the API is deployed

databases:
  - name: mood-db
    plan: free
    databaseName: mood_tracker
    user: mood_user
